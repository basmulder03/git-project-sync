version: 1
project: git-project-sync
default_branch: main

source_of_truth:
  - AGENTS.md
  - docs/project/product-requirements.md
  - docs/engineering/system-architecture.md
  - docs/reference/cli-command-specification.md
  - docs/reference/configuration-schema.md
  - docs/reference/pat-permission-requirements.md
  - docs/engineering/acceptance-test-matrix.md
  - docs/project/implementation-roadmap.md
  - ai/agents.yaml
  - ai/backlog.yaml
  - ai/START_HERE.md
  - ai/skills/skills.yaml
  - ai/sprint-01.yaml
  - ai/sprint-02.yaml
  - ai/sprint-03.yaml
  - ai/sprint-04.yaml
  - ai/sprint-05.yaml
  - ai/sprint-06.yaml
  - ai/sprint-07.yaml
  - ai/sprint-08.yaml
  - ai/sprint-09.yaml
  - ai/RUNBOOK.md

execution_order:
  - sprint: S1
    file: ai/sprint-01.yaml
    objective: Foundations, safety core, traceability, multi-source plumbing
    must_complete_before:
      - S2
      - S3
  - sprint: S2
    file: ai/sprint-02.yaml
    objective: TUI parity, install/service registration, self-update and release
    depends_on:
      - S1
    must_complete_before:
      - S3
  - sprint: S3
    file: ai/sprint-03.yaml
    objective: Hardening, resilience, long-run operational readiness
    depends_on:
      - S1
      - S2
    must_complete_before:
      - S4
      - S5
      - S6
  - sprint: S4
    file: ai/sprint-04.yaml
    objective: Release readiness, bootstrap installation, and test coverage closure
    depends_on:
      - S3
    must_complete_before:
      - S5
      - S6
  - sprint: S5
    file: ai/sprint-05.yaml
    objective: Scale validation and operational excellence
    depends_on:
      - S4
    must_complete_before:
      - S6
  - sprint: S6
    file: ai/sprint-06.yaml
    objective: UX polish and v1.0 launch readiness
    depends_on:
      - S4
      - S5
    must_complete_before:
      - S7
      - S8
      - S9
  - sprint: S7
    file: ai/sprint-07.yaml
    objective: Enterprise policy, governance, and audit exports
    depends_on:
      - S6
    must_complete_before:
      - S8
      - S9
  - sprint: S8
    file: ai/sprint-08.yaml
    objective: Ecosystem integrations and automation controls
    depends_on:
      - S7
    must_complete_before:
      - S9
  - sprint: S9
    file: ai/sprint-09.yaml
    objective: Performance tuning, maintainability, and LTS baseline
    depends_on:
      - S7
      - S8

governance:
  required_commit_policy:
    - Create commits at logical checkpoints.
    - Keep one cohesive change per commit.
    - Include related tests with each logical change.
    - Do not bundle unrelated changes.
    - Keep secret-safe output (no token leakage in logs or commit content).
  required_handoff:
    - Files changed
    - Tests run and results
    - Commits created (hash, message, rationale)
    - Remaining risks and follow-ups

global_exit_criteria:
  - All tasks in sprint 01, 02, 03, 04, 05, 06, 07, 08, and 09 are completed.
  - Acceptance tests pass across Linux and Windows.
  - Fresh-machine install works without requiring preinstalled CLI binaries.
  - Coverage thresholds for critical packages are enforced in CI.
  - Governance/audit exports and automation controls are operationally usable.
  - Performance and benchmark regression gates are active in CI.
  - Logging/traceability is present from first implementation phase onward.
  - Multi-source and multi-account behavior works for GitHub and Azure DevOps.
  - Sensitive data is stored in OS credential manager (or secure fallback only).
  - Non-sensitive state/config persists in config file and/or local DB.
  - Managed workspace layout is deterministic and navigable.
