version: 1
sprint:
  id: S1
  name: Foundations and Safety Core
  goal: Deliver a usable safety-first sync core with traceability, multi-source plumbing, and CLI/daemon vertical slice.
  duration_days: 10

tasks:
  - id: S1-T01
    title: Initialize project structure and module skeleton
    backlog_refs: [E1-T1]
    files:
      - go.mod
      - cmd/syncd/main.go
      - cmd/syncctl/main.go
      - internal/core/config/config.go
      - internal/core/logging/logger.go
    implementation_notes:
      - Create compile-ready binaries with stub command handlers.
      - Add baseline config loader with schema version check.
    tests:
      - "go test ./..."
    commit_checkpoint: "chore: scaffold project binaries and core module layout"

  - id: S1-T02
    title: Implement config + state persistence split
    backlog_refs: [E8-T5]
    files:
      - internal/core/config/config.go
      - internal/core/state/store.go
      - internal/core/state/sqlite_store.go
      - docs/reference/configuration-schema.md
    implementation_notes:
      - Persist non-sensitive data in config and local SQLite.
      - Add migration-safe schema/version handling.
    tests:
      - "go test ./internal/core/config ./internal/core/state"
    commit_checkpoint: "feat(config): persist non-sensitive state in config and sqlite"

  - id: S1-T03
    title: Add secure credential abstraction (OS keyring + secure fallback)
    backlog_refs: [E2-T3]
    files:
      - internal/core/auth/token_store.go
      - internal/core/auth/keyring_store.go
      - internal/core/auth/fallback_store.go
      - docs/reference/pat-permission-requirements.md
    implementation_notes:
      - Store sensitive data only in OS credential manager when available.
      - Add explicit secure fallback behavior for unsupported environments.
    tests:
      - "go test ./internal/core/auth"
    commit_checkpoint: "feat(auth): add keyring-backed token storage with secure fallback"

  - id: S1-T04
    title: Implement source registry for multi-account/provider support
    backlog_refs: [E2-T4, E2-T5]
    files:
      - internal/core/providers/sources.go
      - internal/core/config/config.go
      - cmd/syncctl/source_cmd.go
      - docs/reference/cli-command-specification.md
    implementation_notes:
      - Support multiple active GitHub/Azure sources simultaneously.
      - Include personal and organization metadata per source.
    tests:
      - "go test ./internal/core/providers ./cmd/syncctl/..."
    commit_checkpoint: "feat(source): add multi-source registry and source CLI commands"

  - id: S1-T05
    title: Build managed workspace layout resolver
    backlog_refs: [E8-T4]
    files:
      - internal/core/workspace/layout.go
      - internal/core/workspace/validator.go
      - cmd/syncctl/workspace_cmd.go
      - docs/engineering/system-architecture.md
    implementation_notes:
      - Implement deterministic path convention provider/account/repo.
      - Add layout validation and dry-run fix preview.
    tests:
      - "go test ./internal/core/workspace ./cmd/syncctl/..."
    commit_checkpoint: "feat(workspace): implement deterministic repository layout and validation"

  - id: S1-T06
    title: Implement git dirty-state detection and safety guards
    backlog_refs: [E1-T1]
    files:
      - internal/core/git/client.go
      - internal/core/git/safety.go
      - internal/core/sync/repo_job.go
    implementation_notes:
      - Detect staged/unstaged/untracked/conflicts.
      - Block all mutating actions on dirty repos with explicit reason code.
    tests:
      - "go test ./internal/core/git ./internal/core/sync"
    commit_checkpoint: "feat(git-safety): block mutation on dirty repos with reason logging"

  - id: S1-T07
    title: Implement default-branch resolution and FF-only sync checks
    backlog_refs: [E1-T2, E1-T3]
    files:
      - internal/core/git/branches.go
      - internal/core/sync/engine.go
      - internal/core/providers/github.go
      - internal/core/providers/azuredevops.go
    implementation_notes:
      - Resolve default branch from remote HEAD with provider fallback.
      - Allow only fast-forward updates.
    tests:
      - "go test ./internal/core/git ./internal/core/sync ./internal/core/providers"
    commit_checkpoint: "feat(sync): add dynamic default branch and fast-forward-only updates"

  - id: S1-T08
    title: Implement stale-branch cleanup safety flow
    backlog_refs: [E1-T4]
    files:
      - internal/core/git/cleanup.go
      - internal/core/sync/repo_job.go
      - docs/engineering/acceptance-test-matrix.md
    implementation_notes:
      - If checked-out branch is merged and safe, switch to default then delete.
      - Verify no unique local commits before deletion.
    tests:
      - "go test ./internal/core/git ./internal/core/sync"
    commit_checkpoint: "feat(cleanup): safe stale-branch deletion with unique-commit guard"

  - id: S1-T09
    title: Add daemon scheduler, per-repo locks, and retry/backoff
    backlog_refs: [E3-T1, E3-T2]
    files:
      - internal/core/daemon/scheduler.go
      - internal/core/daemon/locks.go
      - cmd/syncd/main.go
    implementation_notes:
      - Add periodic runs with jitter and timeout propagation.
      - Prevent concurrent sync on same repo.
    tests:
      - "go test ./internal/core/daemon"
    commit_checkpoint: "feat(daemon): scheduler with retries and per-repo lock protection"

  - id: S1-T10
    title: Implement structured events, trace IDs, and query API
    backlog_refs: [E3-T4, E3-T5]
    files:
      - internal/core/telemetry/events.go
      - internal/core/daemon/service_api.go
      - cmd/syncctl/trace_cmd.go
      - cmd/syncctl/events_cmd.go
    implementation_notes:
      - Every run gets trace ID; repo actions link to that ID.
      - Expose events and trace lookup through CLI.
    tests:
      - "go test ./internal/core/telemetry ./internal/core/daemon ./cmd/syncctl/..."
    commit_checkpoint: "feat(trace): add structured event pipeline and trace query commands"

  - id: S1-T11
    title: Add CLI vertical slice for repo sync and source auth flows
    backlog_refs: [E4-T1, E4-T4]
    files:
      - cmd/syncctl/repo_cmd.go
      - cmd/syncctl/auth_cmd.go
      - cmd/syncctl/source_cmd.go
      - docs/reference/cli-command-specification.md
    implementation_notes:
      - Implement one-shot sync for single repo and all repos.
      - Implement source login/test/logout operations.
    tests:
      - "go test ./cmd/syncctl/..."
    commit_checkpoint: "feat(cli): implement repo sync plus source auth command set"

  - id: S1-T12
    title: Add integration tests and CI matrix for sprint scope
    backlog_refs: [E8-T1, E8-T2]
    files:
      - tests/integration/sync_safety_test.go
      - tests/integration/multi_source_test.go
      - .github/workflows/ci.yml
      - docs/project/implementation-roadmap.md
    implementation_notes:
      - Cover dirty-repo skip, trace logging, and multi-source routing.
      - Run matrix for linux/windows.
    tests:
      - "go test ./tests/integration/..."
      - "go test ./..."
    commit_checkpoint: "test(ci): add integration safety coverage and linux/windows matrix"

definition_of_done:
  - All tasks S1-T01..S1-T12 merged.
  - Acceptance tests 1, 3, 4, 5, 8, 13, 14, 17, 18, 19, 20, 21, 22 pass.
  - No secrets are persisted in config or logs.
  - Commit history shows logical checkpoints by task slice.
