name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go version
        run: go version

      - name: Unit and package tests
        run: go test ./...

      - name: Integration tests
        run: go test ./tests/integration/...

      - name: Reliability and failure-injection tests
        run: go test ./tests/integration/... -run 'TestDaemonSoak|TestFailureInjection|TestRateLimit' -count=1

      - name: Build binaries
        run: |
          go build ./cmd/syncctl
          go build ./cmd/syncd
          go build ./cmd/synctui
          go build ./cmd/syncsetup

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate package coverage report
        shell: bash
        run: bash ./scripts/ci/coverage.sh

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: $(go env GOPATH)/bin/govulncheck ./...

      - name: Run gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --no-git --redact --exit-code 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  acceptance-closure:
    runs-on: ubuntu-latest
    needs: [test, coverage, security]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify acceptance/release gate docs
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/ACCEPTANCE_TESTS.md
          test -f docs/RELEASE_CHECKLIST.md
          grep -q "## Verification Mapping" docs/ACCEPTANCE_TESTS.md
          grep -q "## Release Candidate Gate" docs/RELEASE_CHECKLIST.md
          grep -q "## Rollback Decision Checklist" docs/RELEASE_CHECKLIST.md

      - name: Final release-candidate regression sweep
        run: go test ./...
