name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go version
        run: go version

      - name: Unit and package tests
        run: go test ./...

      - name: Integration tests
        run: go test ./tests/integration/...

      - name: Reliability and failure-injection tests
        run: go test ./tests/integration/... -run 'TestDaemonSoak|TestFailureInjection|TestRateLimit' -count=1

      - name: Build binaries
        run: |
          go build ./cmd/syncctl
          go build ./cmd/syncd
          go build ./cmd/synctui
          go build ./cmd/syncsetup

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate package coverage report
        shell: bash
        run: ./scripts/ci/coverage.sh

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
