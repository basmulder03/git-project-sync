name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag (for example: v1.0.0 or v1.0.0-rc1)"
        required: true
        type: string
      target_ref:
        description: "Git ref to tag for manual release (branch/commit)"
        required: true
        default: "main"
        type: string
      prerelease:
        description: "Mark GitHub Release as pre-release"
        required: false
        default: false
        type: boolean
      rc_gate_approved:
        description: "Release candidate gate reviewed and approved"
        required: true
        type: boolean
      rollback_plan_reviewed:
        description: "Rollback decision checklist reviewed"
        required: true
        type: boolean

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ref || github.ref }}

      - name: Resolve and validate release version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME:-}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "release version is required"
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$ ]]; then
            echo "invalid version format: $VERSION"
            echo "expected: v<major>.<minor>.<patch>[-rcN]"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.prerelease }}" == "true" ]]; then
              PRERELEASE="true"
            elif [[ "$VERSION" == *-rc* ]]; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          else
            if [[ "$VERSION" == *-rc* ]]; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Enforce release candidate gate (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.rc_gate_approved }}" != "true" ]]; then
            echo "rc_gate_approved must be true"
            exit 1
          fi
          if [[ "${{ inputs.rollback_plan_reviewed }}" != "true" ]]; then
            echo "rollback_plan_reviewed must be true"
            exit 1
          fi

      - name: Create and push release tag (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "tag already exists locally: $VERSION"
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q "$VERSION"; then
            echo "tag already exists on origin: $VERSION"
            exit 1
          fi

          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Verify acceptance/release gate docs
        shell: bash
        run: |
          set -euo pipefail
          grep -q "## Verification Mapping" docs/engineering/acceptance-test-matrix.md
          grep -q "## Release Candidate Gate" docs/release/release-candidate-checklist.md
          grep -q "## Rollback Decision Checklist" docs/release/release-candidate-checklist.md

      - name: Run tests
        run: go test ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: $(go env GOPATH)/bin/govulncheck ./...

      - name: Run gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --no-git --redact --exit-code 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build artifacts
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          mkdir -p dist

          for os in linux windows; do
            for arch in amd64; do
              ext=""
              if [[ "$os" == "windows" ]]; then
                ext=".exe"
              fi

              GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags "-X main.version=$VERSION" -o "dist/syncctl_${os}_${arch}${ext}" ./cmd/syncctl
              GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags "-X main.version=$VERSION" -o "dist/syncd_${os}_${arch}${ext}" ./cmd/syncd
              GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags "-X main.version=$VERSION" -o "dist/synctui_${os}_${arch}${ext}" ./cmd/synctui
            done
          done

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        shell: bash
        run: |
          set -euo pipefail
          syft dir:dist -o spdx-json=dist/sbom.spdx.json
          syft dir:dist -o cyclonedx-json=dist/sbom.cdx.json

      - name: Build manifest
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          DATE_UTC="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}"

          build_entry() {
            local file="$1"
            local os="$2"
            local arch="$3"
            local sha
            sha="$(grep "  ${file}$" dist/checksums.txt | awk '{print $1}')"
            printf '{"os":"%s","arch":"%s","url":"%s/%s","sha256":"%s","signature":""}' "$os" "$arch" "$BASE_URL" "$file" "$sha"
          }

          A1="$(build_entry syncctl_linux_amd64 linux amd64)"
          A2="$(build_entry syncctl_windows_amd64.exe windows amd64)"

          cat > dist/manifest.json <<EOF
          {
            "version": "${VERSION}",
            "channel": "stable",
            "published_at": "${DATE_UTC}",
            "artifacts": [
              ${A1},
              ${A2}
            ]
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: |
            dist/*
          generate_release_notes: true
