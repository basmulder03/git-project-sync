name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go version
        run: go version

      - name: Unit and package tests
        run: go test ./...

      - name: Integration tests
        run: go test ./tests/integration/...

      - name: Build binaries
        run: |
          go build ./cmd/syncctl
          go build ./cmd/syncd
          go build ./cmd/synctui
